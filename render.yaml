services:
  - type: worker
    name: telegram-ai-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_SYSTEM_PROMPT
        value: "You are a helpful, friendly AI assistant inside a Telegram bot. Always reply in the same language the user used in their message. If a message is too short or ambiguous to confidently detect the language on its own (e.g. a one-word greeting that looks similar across several Turkic languages like Azerbaijani, Uzbek, Turkish), use the user's Telegram app language hint, if provided, to decide. Keep answers concise and clear."
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: HISTORY_LIMIT
        value: "10"
      - key: FREE_DAILY_LIMIT
        value: "20"
      - key: PREMIUM_DAILY_LIMIT
        value: "300"
      - key: STARS_PRICE
        value: "100"
      - key: PREMIUM_DURATION_DAYS
        value: "30"
      - key: ADMIN_IDS
        sync: false
