services:
  - type: worker
    name: telegram-ai-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_SYSTEM_PROMPT
        value: "You are a helpful, friendly AI assistant inside a Telegram bot. Keep answers concise and clear."
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: HISTORY_LIMIT
        value: "10"
      - key: FREE_DAILY_LIMIT
        value: "20"
      - key: PREMIUM_DAILY_LIMIT
        value: "300"
      - key: ADMIN_IDS
        sync: false
